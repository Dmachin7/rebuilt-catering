<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReBuilt Meals — Catering Order</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: '#1e4520',
            'forest-mid': '#2f6233',
            'forest-light': '#4a8a2a',
            gold: '#c8922a',
            'gold-light': '#e5ae48',
            cream: '#faf8f4',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }

    .step-enter { animation: stepIn 0.28s ease-out both; }
    @keyframes stepIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-hover { transition: border-color .15s, box-shadow .15s, background .15s, transform .15s; }
    .card-hover:hover { transform: translateY(-2px); }

    .chip { transition: border-color .12s, background .12s, color .12s; }

    .qty-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: #1e4520; color: #fff; border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; line-height: 1; cursor: pointer;
      transition: background .15s, transform .1s;
      user-select: none; flex-shrink: 0;
    }
    .qty-btn:hover { background: #2f6233; }
    .qty-btn:active { transform: scale(.93); }

    .btn-primary {
      background: #1e4520; color: #fff;
      padding: 12px 28px; border-radius: 12px;
      font-weight: 600; font-size: 15px;
      cursor: pointer; border: none;
      transition: background .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 2px 10px rgba(30,69,32,.28);
    }
    .btn-primary:hover { background: #2f6233; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(30,69,32,.32); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-secondary {
      background: transparent; color: #1e4520;
      padding: 12px 24px; border-radius: 12px;
      font-weight: 600; font-size: 15px;
      cursor: pointer; border: 2px solid #1e4520;
      transition: background .15s, color .15s;
    }
    .btn-secondary:hover { background: #1e4520; color: #fff; }

    .pstep-circle {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      transition: all .3s; position: relative; z-index: 2; flex-shrink: 0;
    }
    .pstep-done   { background: #1e4520; color: #fff; }
    .pstep-active { background: #c8922a; color: #fff; box-shadow: 0 0 0 4px rgba(200,146,42,.22); }
    .pstep-idle   { background: #e5e7eb; color: #9ca3af; }

    input:focus, textarea:focus {
      outline: none;
      border-color: #1e4520 !important;
      box-shadow: 0 0 0 3px rgba(30,69,32,.12);
    }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

    #toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #dc2626; color: #fff;
      padding: 10px 20px; border-radius: 12px;
      font-size: 14px; font-weight: 600;
      z-index: 9999; box-shadow: 0 4px 18px rgba(0,0,0,.2);
      display: none; max-width: 90vw; text-align: center;
    }

    .upcharge-badge {
      display: inline-block;
      background: #c8922a; color: #fff;
      font-size: 9px; font-weight: 700;
      padding: 2px 5px; border-radius: 20px;
      white-space: nowrap; margin-top: 3px;
    }
    .veg-badge {
      display: inline-block;
      background: #dcfce7; color: #166534;
      font-size: 9px; font-weight: 700;
      padding: 2px 5px; border-radius: 20px;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }

    /* ── Flatpickr forest/gold theme ── */
    .flatpickr-calendar {
      border-radius: 18px !important; border: none !important;
      box-shadow: 0 8px 40px rgba(0,0,0,.18) !important;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif !important;
      overflow: hidden;
    }
    .flatpickr-months { background: #1e4520 !important; padding: 4px 0 !important; }
    .flatpickr-month, .flatpickr-current-month,
    .flatpickr-monthDropdown-months { background: #1e4520 !important; color: #fff !important; }
    .flatpickr-monthDropdown-months { border: none !important; }
    .flatpickr-current-month .numInputWrapper { color: #fff !important; }
    .flatpickr-current-month .numInputWrapper span.arrowUp:after  { border-bottom-color: rgba(255,255,255,.8) !important; }
    .flatpickr-current-month .numInputWrapper span.arrowDown:after { border-top-color:  rgba(255,255,255,.8) !important; }
    .flatpickr-prev-month svg, .flatpickr-next-month svg { fill: rgba(255,255,255,.8) !important; }
    .flatpickr-prev-month:hover svg, .flatpickr-next-month:hover svg { fill: #c8922a !important; }
    .flatpickr-weekdays { background: #fff !important; padding-top: 6px !important; }
    .flatpickr-weekday { color: #9ca3af !important; font-weight: 700 !important; font-size: 10px !important; }
    .flatpickr-day {
      border-radius: 10px !important; color: #374151 !important; font-weight: 500 !important;
    }
    .flatpickr-day:hover, .flatpickr-day:focus {
      background: #dcfce7 !important; border-color: transparent !important; color: #1e4520 !important;
    }
    .flatpickr-day.selected, .flatpickr-day.selected:hover {
      background: #1e4520 !important; border-color: #1e4520 !important;
      color: #fff !important; font-weight: 700 !important;
    }
    .flatpickr-day.today { border-color: #c8922a !important; color: #c8922a !important; font-weight: 700 !important; }
    .flatpickr-day.today.selected { color: #fff !important; }
    .flatpickr-day.disabled, .flatpickr-day.flatpickr-disabled { color: #d1d5db !important; text-decoration: none !important; }
    .flatpickr-day.prevMonthDay, .flatpickr-day.nextMonthDay { color: #e5e7eb !important; }
    .flatpickr-time { border-top: 2px solid #f3f4f6 !important; background: #fff !important; }
    .flatpickr-time input.flatpickr-hour, .flatpickr-time input.flatpickr-minute {
      color: #1e4520 !important; font-weight: 700 !important; font-size: 20px !important;
    }
    .flatpickr-time .flatpickr-am-pm { color: #1e4520 !important; font-weight: 700 !important; }
    .flatpickr-time input:hover, .flatpickr-time input:focus,
    .flatpickr-time .flatpickr-am-pm:hover, .flatpickr-time .flatpickr-am-pm:focus {
      background: #f0fdf4 !important;
    }
    .flatpickr-time .numInputWrapper span.arrowUp:after   { border-bottom-color: #1e4520 !important; }
    .flatpickr-time .numInputWrapper span.arrowDown:after { border-top-color: #1e4520 !important; }
    .flatpickr-input[readonly] { cursor: pointer !important; }
    /* Standalone time picker popup */
    .flatpickr-calendar.hasTime.noCalendar {
      min-width: 288px !important; border-radius: 18px !important;
      overflow: hidden; padding: 0 !important;
      box-shadow: 0 16px 48px rgba(0,0,0,.18) !important;
    }
    .flatpickr-calendar.hasTime.noCalendar .flatpickr-time {
      border-top: none !important; height: auto !important; padding: 20px 20px 26px !important;
    }
    .flatpickr-calendar.hasTime.noCalendar .flatpickr-time input.flatpickr-hour,
    .flatpickr-calendar.hasTime.noCalendar .flatpickr-time input.flatpickr-minute {
      font-size: 46px !important; height: 80px !important; line-height: 80px !important;
    }
    .flatpickr-calendar.hasTime.noCalendar .flatpickr-time .flatpickr-time-separator {
      font-size: 40px !important; font-weight: 700 !important; color: #1e4520 !important; line-height: 80px !important;
    }
    .flatpickr-calendar.hasTime.noCalendar .flatpickr-time .flatpickr-am-pm {
      font-size: 20px !important; height: 80px !important; line-height: 80px !important; font-weight: 700 !important;
    }
    .flatpickr-calendar.hasTime.noCalendar .numInputWrapper span.arrowUp,
    .flatpickr-calendar.hasTime.noCalendar .numInputWrapper span.arrowDown {
      height: 50% !important; padding: 0 8px !important;
    }
  </style>
</head>
<body class="bg-cream" style="padding-bottom:130px; min-height:100vh; overflow-x:hidden;">

<!-- TOAST -->
<div id="toast"></div>

<!-- ═══════════════════════════════════ HEADER ═══════════════════════════════════ -->
<header class="bg-forest sticky top-0 z-50" style="box-shadow:0 2px 16px rgba(0,0,0,.22);">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between" style="min-height:64px;">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 flex items-center justify-center flex-shrink-0">
        <img src="rebuilt-logo.png" alt="ReBuilt Meals" class="w-full h-full object-contain"
             onerror="this.parentElement.innerHTML='<span style=\'font-weight:900;color:#1e4520;font-size:16px;\'>RM</span>'">
      </div>
      <div>
        <div class="text-white font-bold text-xl leading-tight" style="letter-spacing:-.3px;">ReBuilt Meals</div>
        <div class="text-xs font-bold tracking-widest" style="color:#68b030;">CATERING</div>
      </div>
    </div>
  </div>
</header>

<!-- ═══════════════════════════════ PROGRESS BAR ═══════════════════════════════ -->
<div class="bg-white border-b border-gray-100 sticky z-40" style="top:64px;box-shadow:0 1px 8px rgba(0,0,0,.06);">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-4">
    <div class="relative" style="height:56px;">
      <!-- Track background -->
      <div style="position:absolute;top:17px;left:17px;right:17px;height:2px;background:#e5e7eb;z-index:1;"></div>
      <!-- Track fill -->
      <div id="prog-fill" style="position:absolute;top:17px;left:17px;height:2px;background:#1e4520;width:0;transition:width .45s ease;z-index:1;"></div>
      <!-- Step circles + labels -->
      <div class="flex justify-between items-start" style="position:relative;z-index:2;">
        <div class="flex flex-col items-center gap-1" id="sw1" onclick="jumpStep(1)" style="cursor:pointer;">
          <div class="pstep-circle pstep-active" id="sc1">1</div>
          <span class="hidden sm:block text-[10px] font-semibold text-forest" id="sl1">Plan</span>
        </div>
        <div class="flex flex-col items-center gap-1" id="sw2" onclick="jumpStep(2)" style="cursor:not-allowed;opacity:.5;">
          <div class="pstep-circle pstep-idle" id="sc2">2</div>
          <span class="hidden sm:block text-[10px] font-medium text-gray-400" id="sl2">Date</span>
        </div>
        <div class="flex flex-col items-center gap-1" id="sw3" onclick="jumpStep(3)" style="cursor:not-allowed;opacity:.5;">
          <div class="pstep-circle pstep-idle" id="sc3">3</div>
          <span class="hidden sm:block text-[10px] font-medium text-gray-400" id="sl3">Menu</span>
        </div>
        <div class="flex flex-col items-center gap-1" id="sw4" onclick="jumpStep(4)" style="cursor:not-allowed;opacity:.5;">
          <div class="pstep-circle pstep-idle" id="sc4">4</div>
          <span class="hidden sm:block text-[10px] font-medium text-gray-400" id="sl4">Add-Ons</span>
        </div>
        <div class="flex flex-col items-center gap-1" id="sw5" onclick="jumpStep(5)" style="cursor:not-allowed;opacity:.5;">
          <div class="pstep-circle pstep-idle" id="sc5">5</div>
          <span class="hidden sm:block text-[10px] font-medium text-gray-400" id="sl5">Delivery</span>
        </div>
        <div class="flex flex-col items-center gap-1" id="sw6" onclick="jumpStep(6)" style="cursor:not-allowed;opacity:.5;">
          <div class="pstep-circle pstep-idle" id="sc6">6</div>
          <span class="hidden sm:block text-[10px] font-medium text-gray-400" id="sl6">Summary</span>
        </div>
        <div class="flex flex-col items-center gap-1" id="sw7" onclick="jumpStep(7)" style="cursor:not-allowed;opacity:.5;">
          <div class="pstep-circle pstep-idle" id="sc7">✓</div>
          <span class="hidden sm:block text-[10px] font-medium text-gray-400" id="sl7">Confirm</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════ MAIN CONTENT ═══════════════════════════════ -->
<main class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
  <div id="step-wrap" class="step-enter" style="min-height:380px;"></div>

</main>

<!-- ═══════════════════════════════ STICKY FOOTER ═══════════════════════════════ -->
<div class="fixed bottom-0 left-0 right-0 z-50" style="pointer-events:none;">

  <!-- Floating centered pill -->
  <div class="flex justify-center px-4 pb-3 pt-1.5" style="pointer-events:none;">
    <div class="bg-forest rounded-2xl overflow-hidden" style="width:100%;max-width:680px;box-shadow:0 8px 32px rgba(0,0,0,.3);pointer-events:auto;">

      <!-- Cart pull-up panel (inside pill, inherits width) -->
      <div id="cart-panel" style="display:none;max-height:55vh;overflow-y:auto;border-bottom:1px solid rgba(255,255,255,.1);"></div>

      <!-- Cart toggle strip -->
      <div style="border-bottom:1px solid rgba(255,255,255,.08);">
        <button id="cart-toggle-btn" onclick="toggleCart()" class="w-full flex items-center justify-center gap-1.5 py-1.5 text-xs font-semibold" style="color:rgba(255,255,255,.5);background:none;border:none;cursor:pointer;">
          <svg id="cart-chevron" class="w-3 h-3 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"/></svg>
          View Order
        </button>
      </div>

      <!-- Main bar -->
      <div class="px-3 sm:px-5 py-2.5 flex items-center gap-2 sm:gap-3">

        <!-- Back -->
        <button id="foot-back-btn" onclick="goBack()"
          style="display:none;align-items:center;gap:4px;padding:8px 11px;border-radius:10px;border:2px solid rgba(255,255,255,.3);background:transparent;color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;"
          onmouseover="this.style.background='rgba(255,255,255,.12)'" onmouseout="this.style.background='transparent'">← Back</button>

        <!-- Centre: plan name -->
        <div class="flex-1 min-w-0 text-center">
          <div class="text-xs sm:text-sm font-bold text-white leading-tight truncate" id="foot-plan"></div>
        </div>

        <!-- Total -->
        <div class="flex-shrink-0 text-right">
          <div class="text-[9px] font-bold tracking-widest leading-none mb-0.5" style="color:rgba(255,255,255,.45);">TOTAL</div>
          <div class="text-base sm:text-lg font-bold text-white leading-none" id="foot-total">$0.00</div>
        </div>

        <!-- Next -->
        <button id="foot-next-btn" onclick="goNext()"
          style="display:flex;align-items:center;gap:4px;padding:8px 11px;border-radius:10px;border:none;background:#c8922a;color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;box-shadow:0 2px 8px rgba(200,146,42,.4);flex-shrink:0;"
          onmouseover="this.style.background='#e5ae48'" onmouseout="this.style.background='#c8922a'">Next →</button>

      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════ JAVASCRIPT ═══════════════════════════════ -->
<script>
// ─────────────────────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────────────────────
const PLANS = [
  { id:'starter',  name:'ReBuilt Starter',    price:13, tagline:'Best for offices & team lunches',                emoji:'🥩', lead:2,
    desc:'Fully customizable proteins & sides. Built for your team.',
    meals:['Blackened Chicken Breast','White Cheddar Jalapeño Mac & Cheese','Roasted Asparagus'] },
  { id:'classics', name:'ReBuilt Classics',   price:15, tagline:'The full ReBuilt experience',                    emoji:'⭐', lead:3,
    desc:'Chef-curated weekly dishes. Globally inspired, seasonally driven.',
    meals:['Korean BBQ Beef Bowl','Citrus Herb Roasted Salmon','Buffalo Chicken Mac & Cheese'] },
  { id:'grabgo',   name:'ReBuilt Grab & Go',  price:12, tagline:'Best for corporate drop-offs & tight schedules', emoji:'🥪', lead:4,
    desc:'Pre-packed wraps & sandwiches. Zero setup, ready to distribute.',
    meals:['Zesty Chipotle Chicken Salad Wrap','ReBuilt Cuban Sandwich','Turkey & Avocado Club'] },
];

const PROTEINS = [
  { name:'Pulled Beef Short Rib',           up:7 },
  { name:'Korean BBQ Beef',                 up:3 },
  { name:'Flank Steak',                     up:3 },
  { name:'Herb Rubbed Turkey',              up:0 },
  { name:'Garlic & Rosemary Pulled Turkey', up:0 },
  { name:'Blackened Turkey',                up:0 },
  { name:'Turkey Burger',                   up:0 },
  { name:'Orange Ginger Chicken Breast',    up:0 },
  { name:'Teriyaki Chicken Breast Pieces',  up:0 },
  { name:'Hawaiian Glazed Chicken Breast',  up:0 },
  { name:'BBQ Pulled Chicken',              up:0 },
  { name:'Salt Free Roasted Chicken Breast',up:0 },
  { name:'Salt & Pepper Chicken Breast',    up:0 },
  { name:'Blackened Chicken Breast',        up:0 },
  { name:'Citrus Grill Chicken Breast',     up:0 },
  { name:'Salt Free Ground Beef',           up:0 },
  { name:'Ground Beef',                     up:0 },
  { name:'Beef Burger',                     up:0 },
  { name:'Roasted Garlic Pork',             up:0 },
  { name:'Pork Carnitas',                   up:0 },
  { name:'Salt & Pepper Chicken Thigh',     up:0 },
  { name:'Chili Lime Chicken Thigh',        up:0 },
  { name:'Salt Free Roasted Pork',          up:0 },
  { name:'Blackened Chicken Thigh',         up:0 },
  { name:'Lemon Pepper Chicken Thigh',      up:0 },
  { name:'BBQ Pulled Pork',                 up:0 },
  { name:'Ground Turkey',                   up:0 },
  { name:'Beyond Burger',                   up:0 },
];

const SIDES = [
  'Roasted Sweet Potatoes','Roasted Red Potatoes','Basmati Rice','Brown Rice','Fiesta Rice',
  'Roasted Asparagus','Shaved Brussels Sprouts w/ Bacon','Buffalo Cauliflower',
  'Garlic & Onion Green Beans','Fajita Vegetables','Salt & Pepper Broccoli',
  'Roasted Brussels Sprouts','White Cheddar Jalapeño Mac & Cheese',
];

const GRABGO = [
  { name:'Turkey & Avocado Club',                 tag:null, note:null,               up:0 },
  { name:'Zesty Chipotle Chicken Salad Wrap',     tag:null, note:null,               up:0 },
  { name:'Roasted Chicken Caprese Salad Wrap',    tag:null, note:null,               up:0 },
  { name:'BLT or Club Sandwich',                  tag:null, note:'avocado +$1/person',up:1 },
  { name:'ReBuilt Cuban Sandwich',                tag:null, note:null,               up:0 },
  { name:'Chicken Caesar Wrap',                   tag:null, note:null,               up:0 },
  { name:'Buffalo Chicken Wrap',                  tag:null, note:null,               up:0 },
  { name:'Hummus & Quinoa Wrap',                  tag:'V',  note:null,               up:0 },
  { name:'Roasted Carrot & Parsnip Salad Wrap',   tag:'V',  note:null,               up:0 },
];

const BEV_DRINKS = [
  { name:'Bottled Water',      up:0 },
  { name:'Sparkling Water',    up:0 },
  { name:'Iced Tea',           up:0 },
  { name:'Soda',               up:0 },
  { name:'Electrolyte Drinks', up:1 },
];

const CLASSICS_MENU = [
  'Korean BBQ Beef Bowl',
  'Citrus Herb Roasted Salmon',
  'Blackened Chicken Thigh Plate',
  'Garlic Butter Shrimp & Rice',
  'Pulled Pork Carnitas Bowl',
  'Turkey Taco Lettuce Wrap',
  'Buffalo Chicken Mac & Cheese',
  'Lemon Pepper Salmon',
  'Hawaiian Glazed Chicken Bowl',
  'Herb Roasted Turkey Breast Plate',
];


const SALADS = [
  { name:'Classic Caesar Salad',   half:25, full:45 },
  { name:'Garden Mixed Greens',    half:25, full:45 },
  { name:'Greek Salad',            half:25, full:45 },
  { name:'Seasonal Fruit Salad',   half:25, full:45 },
];

const DESSERTS = [
  { name:'Cookie & Bar Selection',       emoji:'🍪', ppd:14 },
  { name:'Doughnuts (flavor of the week)',emoji:'🍩', ppd:14 },
  { name:'Muffin Assortment',            emoji:'🧁', ppd:14 },
];

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
const S = {
  step: 1,
  plan: null,
  proteins: [],
  sides: [],
  grabgo: [],
  classics: [],
  addOns: { bevs: {}, salads: {}, desserts: {}, plating: 'family' },
  det: { date:'', time:'', guests:10, addr:'', co:'', cname:'', cemail:'', phone:'', notes:'' },
};

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function calcTotal() {
  if (!S.plan) return 0;
  const pl = PLANS.find(p => p.id === S.plan);
  const g  = Math.max(0, parseInt(S.det.guests) || 0);
  let t = pl.price * g;
  if (S.plan === 'starter') {
    S.proteins.forEach(n => { const p = PROTEINS.find(x => x.name===n); if (p?.up) t += p.up * g; });
  }
  if (S.plan === 'grabgo' && S.grabgo.includes('BLT or Club Sandwich')) t += g;
  const bevKeys = Object.keys(S.addOns.bevs);
  if (bevKeys.length) {
    t += 2.5 * g;
    BEV_DRINKS.filter(d=>d.up>0).forEach(d=>{ if (d.name in S.addOns.bevs) t += d.up*(S.addOns.bevs[d.name]||0); });
  }
  Object.entries(S.addOns.salads).forEach(([n,q]) => {
    const s = SALADS.find(x => x.name===n); if (s) t += (q.half||0)*s.half + (q.full||0)*s.full;
  });
  Object.entries(S.addOns.desserts).forEach(([n,q]) => {
    const d = DESSERTS.find(x => x.name===n); if (d) t += d.ppd * (parseInt(q)||0);
  });
  return t;
}

function bizDaysAhead(n) {
  const d = new Date(); d.setHours(0,0,0,0);
  let added = 0;
  while (added < n) { d.setDate(d.getDate()+1); const dw = d.getDay(); if (dw!==0&&dw!==6) added++; }
  return d.toISOString().split('T')[0];
}

function fmtDate(s) {
  if (!s) return 'TBD';
  return new Date(s+'T12:00:00').toLocaleDateString('en-US',{ weekday:'long',month:'long',day:'numeric',year:'numeric' });
}
function fmtTime12(t) {
  if (!t) return '';
  const [h,m] = t.split(':').map(Number);
  return `${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;
}

function chk(id)  { return `<svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>`; }
function chkLg()  { return `<svg class="w-3.5 h-3.5 text-white" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>`; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '⚠️  ' + msg;
  t.style.display = 'block';
  clearTimeout(t._tid);

}

// ─────────────────────────────────────────────────────────────────────────────
// PROGRESS / NAV UPDATE
// ─────────────────────────────────────────────────────────────────────────────
function updateUI() {
  const s = S.step;

  for (let i=1;i<=7;i++) {
    const ci = document.getElementById('sc'+i);
    const li = document.getElementById('sl'+i);
    ci.className = 'pstep-circle ';
    if (i < s)      { ci.className += 'pstep-done';   ci.textContent = '✓'; }
    else if (i===s) { ci.className += 'pstep-active';  ci.textContent = i===7?'✓':i; }
    else            { ci.className += 'pstep-idle';    ci.textContent = i===7?'✓':i; }
    if (li) {
      li.className = 'hidden sm:block text-[10px] font-semibold ';
      li.className += i===s ? 'text-forest' : i<s ? 'text-forest-mid' : 'text-gray-400';
    }
  }

  // Step wrapper clickability — allow jumping to any visited step
  for (let i=1;i<=7;i++) {
    const sw = document.getElementById('sw'+i);
    if (!sw) continue;
    const reachable = i <= s;
    sw.style.cursor  = reachable ? 'pointer' : 'not-allowed';
    sw.style.opacity = reachable ? '1' : '0.45';
  }

  // Progress fill: track spans center-of-circle-1 to center-of-circle-7 (6 gaps)
  const pct = (s-1)/6;
  document.getElementById('prog-fill').style.width = `calc(${pct*100}% - ${pct*34}px)`;

  // Footer
  const total = calcTotal();
  document.getElementById('foot-total').textContent = '$'+total.toFixed(2);
  const pl = PLANS.find(p=>p.id===S.plan);
  document.getElementById('foot-plan').textContent = pl ? pl.name : '';

  // Footer nav buttons
  const footBack = document.getElementById('foot-back-btn');
  const footNext = document.getElementById('foot-next-btn');
  if (footBack) footBack.style.display = (s===1||s===7) ? 'none' : 'flex';
  if (footNext) {
    footNext.style.display = s===7 ? 'none' : 'flex';
    if (s===6) {
      const ok = total>=500;
      footNext.textContent = 'Checkout →';
      footNext.disabled = !ok;
      footNext.style.background = ok ? '#c8922a' : '#9ca3af';
      footNext.style.cursor = ok ? 'pointer' : 'not-allowed';
    } else {
      footNext.textContent = 'Next →';
      footNext.disabled = false;
      footNext.style.background = '#c8922a';
      footNext.style.cursor = 'pointer';
    }
  }
}

// RENDER DISPATCHER
// ─────────────────────────────────────────────────────────────────────────────
function render() {
  const w = document.getElementById('step-wrap');
  w.classList.remove('step-enter');
  void w.offsetWidth;
  w.classList.add('step-enter');
  const map = [null, step1, step2, step3, step4, step5, step6, step7];
  w.innerHTML = map[S.step]();
  updateUI();
  if (S.step === 2) initPickers();
}

function initPickers() {
  if (!window.flatpickr) return;
  const pl = PLANS.find(p => p.id === S.plan);
  if (!pl) return;

  // Center the calendar popup under its input (Flatpickr defaults to left-align)
  function centerCal(fp) {
    requestAnimationFrame(() => {
      const cal = fp.calendarContainer;
      const inp = fp._positionElement || fp.input;
      if (!inp || !cal) return;
      const ir  = inp.getBoundingClientRect();
      const cw  = cal.offsetWidth;
      const shift = Math.round((ir.width - cw) / 2);
      if (shift > 0) cal.style.left = (parseFloat(cal.style.left || 0) + shift) + 'px';
    });
  }

  const dateEl = document.getElementById('date');
  if (dateEl) {
    flatpickr(dateEl, {
      minDate: bizDaysAhead(pl.lead),
      defaultDate: S.det.date || null,
      dateFormat: 'F j, Y',
      disableMobile: true,
      onOpen(_, __, fp) { centerCal(fp); },
      onChange([date]) {
        if (!date) { setDet('date', ''); return; }
        const iso = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
        setDet('date', iso);
        const disp = document.getElementById('date-display');
        if (disp) disp.textContent = fmtDate(iso);
      }
    });
  }

  const timeEl = document.getElementById('time');
  if (timeEl) {
    flatpickr(timeEl, {
      enableTime: true,
      noCalendar: true,
      dateFormat: 'h:i K',
      time_24hr: false,
      minuteIncrement: 15,
      disableMobile: true,
      defaultDate: S.det.time ? new Date(`1970-01-01T${S.det.time}:00`) : null,
      onReady(_, __, fp) {
        const hdr = document.createElement('div');
        hdr.style.cssText = 'background:#1e4520;color:#fff;padding:14px 20px;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;text-align:center;';
        hdr.textContent = 'Select Delivery Time';
        fp.calendarContainer.insertBefore(hdr, fp.calendarContainer.firstChild);
        centerCal(fp);
      },
      onOpen(_, __, fp) { centerCal(fp); },
      onChange([date]) {
        if (!date) { S.det.time = ''; updateUI(); return; }
        const h = date.getHours(), m = date.getMinutes();
        S.det.time = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        timeEl.style.color = '#1e4520';
        updateUI();
      }
    });
  }

}

              <div class="text-3xl mb-2">${d.emoji}</div>
              <div class="font-semibold text-sm text-forest mb-4 leading-snug">${d.name}</div>

        </div>
      </section>

    </div>`;
}

function step6() {
  const pl = PLANS.find(p=>p.id===S.plan);
  const d = S.det, g = parseInt(d.guests)||0, total = calcTotal(), ok = total>=500;
  const lines = [];

  lines.push({ label:`${pl.name} base (${g} × $${pl.price})`, amt: pl.price*g, bold:true });
  if (S.plan==='starter') {
    S.proteins.forEach(n => {
      const p = PROTEINS.find(x=>x.name===n);
      if (p?.up) lines.push({ label:`${n} upcharge (${g} × $${p.up})`, amt:p.up*g });
    });
  }
  if (S.plan==='grabgo' && S.grabgo.includes('BLT or Club Sandwich'))
    lines.push({ label:`Avocado upcharge — BLT (${g} × $1)`, amt:g });
  const _bevKeys = Object.keys(S.addOns.bevs);
  if (_bevKeys.length) {
    lines.push({ label:`Beverage Bundle (${g} × $2.50)`, amt:2.5*g });
    BEV_DRINKS.filter(d=>d.up>0).forEach(d=>{
      const qty=S.addOns.bevs[d.name]||0;
      if (d.name in S.addOns.bevs && qty>0) lines.push({ label:`${d.name} upcharge (${qty} × $${d.up})`, amt:qty*d.up });
    });
  }
  Object.entries(S.addOns.salads).forEach(([n,q]) => {
    const s = SALADS.find(x=>x.name===n); if (!s) return;
    if (q.half) lines.push({ label:`${n} · Half ×${q.half}`, amt:q.half*s.half });
    if (q.full) lines.push({ label:`${n} · Full ×${q.full}`,  amt:q.full*s.full });
  });
  Object.entries(S.addOns.desserts).forEach(([n,q]) => {
    if (q>0) lines.push({ label:`${n} · ${q} doz.`, amt:14*q });
  });

  const tag = txt => `<span class="text-xs bg-green-50 text-green-800 border border-green-200 px-2.5 py-1 rounded-full font-medium">${txt}</span>`;
  const editBtn = n => `<button onclick="goToStep(${n})" class="text-xs font-semibold px-2.5 py-1 rounded-lg border border-forest text-forest hover:bg-forest hover:text-white transition-colors">Edit</button>`;

  const noBevs     = Object.keys(S.addOns.bevs).length === 0;
  const noSalads   = Object.keys(S.addOns.salads).length === 0;
  const noDesserts = Object.keys(S.addOns.desserts).length === 0;
  const upsells    = [
    noBevs     && { icon:'🥤', label:'Beverage Bundle',  sub:'Water, sparkling, electrolyte & iced tea',   price:'$4/person' },
    noSalads   && { icon:'🥗', label:'Add a Salad',       sub:'Caesar, mixed greens, Greek or fruit salad',  price:'from $25' },
    noDesserts && { icon:'🍪', label:'Add Desserts',       sub:'Cookies, doughnuts, or muffin assortment',    price:'$14/doz'  },
  ].filter(Boolean);

  return `
    <div>
      <h1 class="text-3xl font-bold text-forest mb-1" style="letter-spacing:-.5px;">Order Summary</h1>
      <p class="text-gray-500 mb-6">Review everything before placing your order.</p>

      <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden mb-4">

        <!-- Plan header -->
        <div class="p-5 bg-forest text-white">
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="text-xs font-bold tracking-widest uppercase mb-1" style="color:rgba(255,255,255,.45);">Selected Plan</div>
              <div class="text-xl font-bold">${pl.name}</div>
              <div class="text-sm mt-1" style="color:rgba(255,255,255,.65);">${fmtDate(d.date)} · ${g} guest${g!==1?'s':''}</div>
            </div>
            <div class="flex flex-col items-end gap-2 flex-shrink-0">
              <button onclick="goToStep(1)" class="text-xs font-semibold px-2.5 py-1 rounded-lg border border-white/40 text-white/80 hover:bg-white/20 transition-colors">Edit</button>
              ${S.plan!=='starter' ? `<div class="text-sm" style="color:rgba(255,255,255,.65);">${S.addOns.plating==='family'?'🍽️ Family Style':'📦 Individually Packaged'}</div>` : ''}
            </div>
          </div>
        </div>

        <!-- Event & delivery info -->
        <div class="p-5 border-b border-gray-100">
          <div class="flex items-center justify-between mb-3">
            <div class="text-xs font-bold tracking-wider text-gray-400 uppercase">Event & Delivery</div>
            ${editBtn(5)}
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-1.5 text-sm">
            ${d.addr   ? `<div><span class="text-gray-400 font-medium">Address:</span> <span class="text-gray-700">${d.addr}</span></div>` : ''}
            ${d.co     ? `<div><span class="text-gray-400 font-medium">Company:</span> <span class="text-gray-700">${d.co}</span></div>` : ''}
            <div><span class="text-gray-400 font-medium">Contact:</span> <span class="text-gray-700">${d.cname}</span></div>
            <div><span class="text-gray-400 font-medium">Email:</span> <span class="text-gray-700">${d.cemail}</span></div>
            ${d.phone  ? `<div><span class="text-gray-400 font-medium">Phone:</span> <span class="text-gray-700">${d.phone}</span></div>` : ''}
            ${d.notes  ? `<div class="sm:col-span-2"><span class="text-gray-400 font-medium">Notes:</span> <span class="text-gray-700">${d.notes}</span></div>` : ''}
          </div>
        </div>

        <!-- Menu selections -->
        <div class="p-5 border-b border-gray-100">
          <div class="flex items-center justify-between mb-3">
            <div class="text-xs font-bold tracking-wider text-gray-400 uppercase">Menu Selections</div>
            ${editBtn(3)}
          </div>
          ${S.plan==='starter' ? `
            <div class="mb-2"><span class="text-xs font-bold text-forest uppercase tracking-wide">Proteins:</span>
              <div class="flex flex-wrap gap-1.5 mt-1.5">${S.proteins.map(tag).join('')}</div></div>
            <div class="mt-3"><span class="text-xs font-bold text-forest uppercase tracking-wide">Sides:</span>
              <div class="flex flex-wrap gap-1.5 mt-1.5">${S.sides.map(tag).join('')}</div></div>` : ''}
          ${S.plan==='grabgo' ? `<div class="flex flex-wrap gap-1.5">${S.grabgo.map(tag).join('')}</div>` : ''}
          ${S.plan==='classics' ? `<div class="flex flex-wrap gap-1.5">${S.classics.map(tag).join('')}</div>` : ''}
        </div>

        <!-- Add-ons -->
        <div class="p-5 border-b border-gray-100">
          <div class="flex items-center justify-between mb-3">

          ${Object.keys(S.addOns.salads).length ? Object.entries(S.addOns.salads).map(([n,q])=>`<div class="text-sm text-gray-600 mb-1">🥗 ${n}${q.half?` · Half ×${q.half}`:''}${q.full?` · Full ×${q.full}`:''}</div>`).join('') : ''}
          ${Object.keys(S.addOns.desserts).length ? Object.entries(S.addOns.desserts).filter(([,q])=>q>0).map(([n,q])=>`<div class="text-sm text-gray-600 mb-1">🍪 ${n} · ${q} doz.</div>`).join('') : ''}
          ${!Object.keys(S.addOns.bevs).length && !Object.keys(S.addOns.salads).length && !Object.keys(S.addOns.desserts).length ? `<p class="text-sm text-gray-400">No add-ons selected.</p>` : ''}
        </div>

        <!-- Pricing -->
        <div class="p-5">
          <div class="text-xs font-bold tracking-wider text-gray-400 uppercase mb-4">Pricing Breakdown</div>
          <div class="space-y-2.5">

          </div>
        </div>
      </div>

      <!-- Before You Checkout -->
      ${upsells.length ? `

          <div class="font-bold text-forest text-sm">Before You Checkout — Want to Add Anything?</div>
        </div>
        <div class="p-4 grid grid-cols-1 sm:grid-cols-${upsells.length===1?'1':upsells.length===2?'2':'3'} gap-3">

            </div>`).join('')}
        </div>
      </div>` : ''}


      <!-- Min warning -->
      ${!ok ? `
        <div class="p-4 rounded-2xl border border-red-200 bg-red-50 flex items-start gap-3">
          <span class="text-red-500 text-xl flex-shrink-0">⚠️</span>
          <div>
            <div class="font-bold text-red-700 text-sm">Order Minimum Not Met</div>
            <div class="text-sm text-red-600 mt-1">Minimum order is <strong>$500</strong>. Your total is $${total.toFixed(2)}.
            Go back to increase guest count or add items.</div>
          </div>
        </div>` :
      `<div class="p-4 rounded-2xl border border-green-200 bg-green-50 flex items-center gap-3">
          <svg class="w-5 h-5 text-green-600 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
          </svg>
          <div class="text-sm font-semibold text-green-800">You're all set — click "Proceed to Checkout" below.</div>
        </div>`}
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// STEP 7 — Confirmation
// ─────────────────────────────────────────────────────────────────────────────
function step7() {
  const pl = PLANS.find(p=>p.id===S.plan);
  const d = S.det, total = calcTotal();
  return `
    <div class="text-center py-4 max-w-lg mx-auto">
      <div class="w-24 h-24 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-6">
        <svg class="w-12 h-12 text-forest" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-forest mb-3" style="letter-spacing:-.5px;">Order Received!</h1>
      <p class="text-gray-600 leading-relaxed mb-8">
        Your order has been received! A member of the <strong>ReBuilt Meals</strong> catering team will
        confirm your order within <strong>1 business day</strong>.
      </p>

      <div class="bg-white rounded-2xl border border-gray-200 p-5 text-left mb-5">
        <div class="text-xs font-bold tracking-wider text-gray-400 uppercase mb-4">Order Confirmation</div>
        <div class="space-y-3 text-sm">
          <div class="flex justify-between"><span class="text-gray-400">Plan</span><span class="font-semibold text-forest">${pl.name}</span></div>
          <div class="flex justify-between"><span class="text-gray-400">Date</span><span class="font-semibold text-forest">${fmtDate(d.date)}</span></div>
          <div class="flex justify-between"><span class="text-gray-400">Guests</span><span class="font-semibold text-forest">${d.guests}</span></div>
          <div class="flex justify-between items-start gap-4"><span class="text-gray-400 flex-shrink-0">Delivery</span><span class="font-semibold text-forest text-right">${d.addr}</span></div>
          ${d.co ? `<div class="flex justify-between"><span class="text-gray-400">Company</span><span class="font-semibold text-forest">${d.co}</span></div>` : ''}
          <div class="flex justify-between"><span class="text-gray-400">Contact</span><span class="font-semibold text-forest">${d.cname}</span></div>
          <div class="border-t border-gray-100 pt-3 flex justify-between items-center">
            <span class="font-bold text-forest text-base">Order Total</span>
            <span class="font-bold text-forest text-xl">$${total.toFixed(2)}</span>
          </div>
        </div>
      </div>

      <div class="p-4 rounded-xl bg-amber-50 border border-amber-200 text-sm text-amber-800 mb-8">
        Confirmation will be sent to <strong>${d.cemail}</strong>
      </div>

      <button onclick="resetOrder()" class="btn-primary">↩ Start a New Order</button>
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// EVENT HANDLERS
// ─────────────────────────────────────────────────────────────────────────────
function pickPlan(i) {
  const id = PLANS[i].id;
  if (S.plan !== id) { S.proteins=[]; S.sides=[]; S.grabgo=[]; S.classics=[]; }
  S.plan = id; S.step = 2;
  render(); scrollTo({top:0,behavior:'smooth'});
}

function toggleProtein(i) {
  const n = PROTEINS[i].name, idx = S.proteins.indexOf(n);
  if (idx>=0) S.proteins.splice(idx,1);
  else if (S.proteins.length<2) S.proteins.push(n);
  render();
}
function toggleSide(i) {
  const n = SIDES[i], idx = S.sides.indexOf(n);
  if (idx>=0) S.sides.splice(idx,1);
  else if (S.sides.length<4) S.sides.push(n);
  render();
}
function toggleGrabGo(i) {
  const n = GRABGO[i].name, idx = S.grabgo.indexOf(n);
  if (idx>=0) S.grabgo.splice(idx,1);
  else if (S.grabgo.length<2) S.grabgo.push(n);
  render();
}
function toggleClassic(i) {
  const n = CLASSICS_MENU[i], idx = S.classics.indexOf(n);
  if (idx>=0) S.classics.splice(idx,1);
  else if (S.classics.length<2) S.classics.push(n);
  render();
}
function bevBundleToggle() {
  if (Object.keys(S.addOns.bevs).length > 0) {
    S.addOns.bevs = {};
  } else {
    const g = parseInt(S.det.guests)||10;
    S.addOns.bevs = { 'Bottled Water': g, 'Sparkling Water': 0, 'Iced Tea': 0, 'Soda': 0, 'Electrolyte Drinks': 0 };
  }
  render();
}

function buildCartHTML() {
  const pl = PLANS.find(p=>p.id===S.plan);
  if (!pl) return `<div class="p-4 text-center text-sm" style="color:rgba(255,255,255,.45);">Select a plan to get started.</div>`;
  const rows = [];
  rows.push({ icon:pl.emoji, label:pl.name, detail:`$${pl.price}/person` });
  if (S.det.guests) rows.push({ icon:'👥', label:`${S.det.guests} Guests`, detail:'' });
  if (S.det.date) rows.push({ icon:'📅', label:fmtDate(S.det.date), detail:fmtTime12(S.det.time) });
  if (S.plan==='starter') {
    S.proteins.forEach(p=>rows.push({ icon:'🥩', label:p, detail:'Protein' }));
    S.sides.forEach(s=>rows.push({ icon:'🥘', label:s, detail:'Side' }));
  }
  if (S.plan==='classics') S.classics.forEach(c=>rows.push({ icon:'⭐', label:c, detail:'Dish' }));
  if (S.plan==='grabgo')   S.grabgo.forEach(g=>rows.push({ icon:'🥪', label:g, detail:'Item' }));
  const bevKeys = Object.keys(S.addOns.bevs);
  if (bevKeys.length) rows.push({ icon:'🥤', label:'Beverage Bundle', detail:bevKeys.join(', ') });
  Object.entries(S.addOns.salads).forEach(([n,q])=>{
    const parts=[]; if(q.half)parts.push(`${q.half}× Half`); if(q.full)parts.push(`${q.full}× Full`);
    rows.push({ icon:'🥗', label:n, detail:parts.join(', ') });
  });
  Object.entries(S.addOns.desserts).filter(([,q])=>q>0).forEach(([n,q])=>rows.push({ icon:'🍪', label:n, detail:`${q} doz.` }));
  const total = calcTotal();
  return `<div class="p-4 max-w-5xl mx-auto">
    <div class="text-xs font-bold tracking-widest mb-3" style="color:rgba(255,255,255,.4);">YOUR ORDER</div>
    <div class="space-y-2">
      ${rows.map(r=>`<div class="flex items-center gap-2.5">
        <span class="text-base flex-shrink-0">${r.icon}</span>
        <span class="text-sm font-medium text-white flex-1 min-w-0 truncate">${r.label}</span>
        ${r.detail?`<span class="text-xs flex-shrink-0" style="color:rgba(255,255,255,.45);">${r.detail}</span>`:''}
      </div>`).join('')}
    </div>
    ${total>0?`<div class="mt-3 pt-3 flex justify-between items-center" style="border-top:1px solid rgba(255,255,255,.15);">
      <span class="text-sm font-semibold text-white">Estimated Total</span>
      <span class="text-base font-bold" style="color:#68b030;">$${total.toFixed(2)}</span>
    </div>`:''}
  </div>`;
}

function toggleCart() {
  const panel = document.getElementById('cart-panel');
  const btn   = document.getElementById('cart-toggle-btn');
  const chev  = document.getElementById('cart-chevron');
  const open  = panel.style.display !== 'none';
  if (open) {
    panel.style.display = 'none';
    chev.style.transform = '';
    btn.querySelector('svg+*') && (btn.lastChild.textContent = ' View Order');
  } else {
    panel.innerHTML = buildCartHTML();
    panel.style.display = 'block';
    chev.style.transform = 'rotate(180deg)';
  }
}

function bevToggle(name) {
  const bevs = S.addOns.bevs;
  if (name in bevs) {
    const qty = bevs[name]||0;
    delete bevs[name];
    const others = Object.keys(bevs);
    if (others.length && qty>0) bevs[others[0]] = (bevs[others[0]]||0)+qty;
  } else {
    bevs[name] = 0;
  }
  render();
}
function bevAdjQty(name, delta) {
  const bevs = S.addOns.bevs;
  const cur = bevs[name] || 0;
  bevs[name] = Math.max(0, cur + delta);
  render();
}
function saladQty(i, sz, delta) {
  const n = SALADS[i].name;
  if (!S.addOns.salads[n]) S.addOns.salads[n] = { half:0, full:0 };
  S.addOns.salads[n][sz] = Math.max(0, (S.addOns.salads[n][sz]||0)+delta);
  if (!S.addOns.salads[n].half && !S.addOns.salads[n].full) delete S.addOns.salads[n];
  render();
}
function dessertQty(i,d)    {
  const n=DESSERTS[i].name, cur=S.addOns.desserts[n]||0, nxt=Math.max(0,cur+d);
  if (nxt===0) delete S.addOns.desserts[n]; else S.addOns.desserts[n]=nxt;
  render();
}
function setPlating(t)      { S.addOns.plating=t; render(); }

function setDet(k,v) {
  if (k==='guests') { const n=Math.max(10,parseInt(v)||10); S.det.guests=n; }
  else S.det[k] = v;
  updateUI();
}
function adjGuests(d) {
  S.det.guests = Math.max(10,(parseInt(S.det.guests)||10)+d);
  const el = document.getElementById('guests'); if (el) el.value = S.det.guests;
  updateUI();
}
// ─────────────────────────────────────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────────────────────────────────────
function validate() {
  const s = S.step;
  if (s===1 && !S.plan)
    return showToast('Please select a plan.'), false;
  if (s===2) {
    const d=S.det;
    if (!d.date)                                   return showToast('Please select an event date.'), false;
    if (!d.guests||d.guests<10)                    return showToast('Minimum guest count is 10.'), false;
  }
  if (s===3 && S.plan==='starter') {
    if (S.proteins.length!==2)                     return showToast('Select exactly 2 proteins.'), false;
    if (S.sides.length!==4)                        return showToast('Select exactly 4 sides.'), false;
  }
  if (s===3 && S.plan==='classics' && S.classics.length!==2)
                                                   return showToast('Select exactly 2 dishes.'), false;
  if (s===3 && S.plan==='grabgo' && S.grabgo.length!==2)
                                                   return showToast('Select exactly 2 items.'), false;
  if (s===5) {
    const d=S.det;
    if (!d.addr.trim())                            return showToast('Please enter a delivery address.'), false;
    if (!d.cname.trim())                           return showToast('Please enter a contact name.'), false;
    if (!d.cemail.trim()||!d.cemail.includes('@')) return showToast('Please enter a valid email.'), false;
  }
  if (s===6 && calcTotal()<500)
    return showToast('Order minimum is $500.'), false;
  return true;
}

function goToStep(n) { S.step=n; render(); scrollTo({top:0,behavior:'smooth'}); }
function jumpStep(n) { if (n<=S.step) goToStep(n); }
function goNext() {
  if (!validate()) return;
  if (S.step<7) { S.step++; render(); scrollTo({top:0,behavior:'smooth'}); }
}
function goBack() {
  if (S.step>1) { S.step--; render(); scrollTo({top:0,behavior:'smooth'}); }
}
function resetOrder() {
  S.step=1; S.plan=null; S.proteins=[]; S.sides=[]; S.grabgo=[]; S.classics=[];
  S.addOns={bevs:{},salads:{},desserts:{},plating:'family'};
  S.det={date:'',time:'',guests:10,addr:'',co:'',cname:'',cemail:'',phone:'',notes:''};
  render(); scrollTo({top:0,behavior:'smooth'});
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
