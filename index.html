<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReBuilt Meals — Catering Order</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: '#1e4520',
            'forest-mid': '#2f6233',
            'forest-light': '#4a8a2a',
            gold: '#c8922a',
            'gold-light': '#e5ae48',
            cream: '#faf8f4',
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }

    .step-enter { animation: stepIn 0.28s ease-out both; }
    @keyframes stepIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-hover { transition: border-color .15s, box-shadow .15s, background .15s, transform .15s; }
    .card-hover:hover { transform: translateY(-2px); }

    .chip { transition: border-color .12s, background .12s, color .12s; }

    .qty-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: #1e4520; color: #fff; border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; line-height: 1; cursor: pointer;
      transition: background .15s, transform .1s;
      user-select: none; flex-shrink: 0;
    }
    .qty-btn:hover { background: #2f6233; }
    .qty-btn:active { transform: scale(.93); }

    .btn-primary {
      background: #1e4520; color: #fff;
      padding: 12px 28px; border-radius: 12px;
      font-weight: 600; font-size: 15px;
      cursor: pointer; border: none;
      transition: background .15s, transform .1s, box-shadow .15s;
      box-shadow: 0 2px 10px rgba(30,69,32,.28);
    }
    .btn-primary:hover { background: #2f6233; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(30,69,32,.32); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-secondary {
      background: transparent; color: #1e4520;
      padding: 12px 24px; border-radius: 12px;
      font-weight: 600; font-size: 15px;
      cursor: pointer; border: 2px solid #1e4520;
      transition: background .15s, color .15s;
    }
    .btn-secondary:hover { background: #1e4520; color: #fff; }

    .pstep-circle {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      transition: all .3s; position: relative; z-index: 2; flex-shrink: 0;
    }
    .pstep-done   { background: #1e4520; color: #fff; }
    .pstep-active { background: #c8922a; color: #fff; box-shadow: 0 0 0 4px rgba(200,146,42,.22); }
    .pstep-idle   { background: #e5e7eb; color: #9ca3af; }

    input:focus, textarea:focus {
      outline: none;
      border-color: #1e4520 !important;
      box-shadow: 0 0 0 3px rgba(30,69,32,.12);
    }
    input[type=number] { -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

    #toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: #dc2626; color: #fff;
      padding: 10px 20px; border-radius: 12px;
      font-size: 14px; font-weight: 600;
      z-index: 9999; box-shadow: 0 4px 18px rgba(0,0,0,.2);
      display: none; max-width: 90vw; text-align: center;
    }

    .upcharge-badge {
      display: inline-block;
      background: #c8922a; color: #fff;
      font-size: 9px; font-weight: 700;
      padding: 2px 5px; border-radius: 20px;
      white-space: nowrap; margin-top: 3px;
    }
    .veg-badge {
      display: inline-block;
      background: #dcfce7; color: #166534;
      font-size: 9px; font-weight: 700;
      padding: 2px 5px; border-radius: 20px;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 3px; }
  </style>
</head>
<body class="bg-cream" style="padding-bottom:88px; min-height:100vh;">

<!-- TOAST -->
<div id="toast"></div>

<!-- ═══════════════════════════════════ HEADER ═══════════════════════════════════ -->
<header class="bg-forest sticky top-0 z-50" style="box-shadow:0 2px 16px rgba(0,0,0,.22);">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between" style="min-height:64px;">
    <div class="flex items-center gap-3">
      <div class="w-11 h-11 rounded-xl bg-white flex items-center justify-center p-1 flex-shrink-0">
        <img src="rebuilt-logo.png" alt="ReBuilt Meals" class="w-full h-full object-contain"
             onerror="this.parentElement.innerHTML='<span style=\'font-weight:900;color:#1e4520;font-size:16px;\'>RM</span>'">
      </div>
      <div>
        <div class="text-white font-bold text-xl leading-tight" style="letter-spacing:-.3px;">ReBuilt Meals</div>
        <div class="text-xs font-bold tracking-widest" style="color:#68b030;">CATERING</div>
      </div>
    </div>
    <div class="hidden sm:block text-right">
      <div class="text-xs font-medium" style="color:rgba(255,255,255,.5);">Catering Order Wizard</div>
      <div class="text-xs" style="color:rgba(255,255,255,.35);">Premium Meal Prep & Delivery</div>
    </div>
  </div>
</header>

<!-- ═══════════════════════════════ PROGRESS BAR ═══════════════════════════════ -->
<div class="bg-white border-b border-gray-100 sticky z-40" style="top:64px;box-shadow:0 1px 8px rgba(0,0,0,.06);">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-4">
    <div class="relative" style="height:56px;">
      <!-- Track background -->
      <div style="position:absolute;top:17px;left:17px;right:17px;height:2px;background:#e5e7eb;z-index:1;"></div>
      <!-- Track fill -->
      <div id="prog-fill" style="position:absolute;top:17px;left:17px;height:2px;background:#1e4520;width:0;transition:width .45s ease;z-index:1;"></div>
      <!-- Step circles + labels -->
      <div class="flex justify-between items-start" style="position:relative;z-index:2;">
        <div class="flex flex-col items-center gap-1">
          <div class="pstep-circle pstep-active" id="sc1">1</div>
          <span class="hidden sm:block text-[10px] font-semibold text-forest" id="sl1">Plan</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <div class="pstep-circle pstep-idle" id="sc2">2</div>
          <span class="hidden sm:block text-[10px] font-medium text-gray-400" id="sl2">Date</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <div class="pstep-circle pstep-idle" id="sc3">3</div>
          <span class="hidden sm:block text-[10px] font-medium text-gray-400" id="sl3">Menu</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <div class="pstep-circle pstep-idle" id="sc4">4</div>
          <span class="hidden sm:block text-[10px] font-medium text-gray-400" id="sl4">Add-Ons</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <div class="pstep-circle pstep-idle" id="sc5">5</div>
          <span class="hidden sm:block text-[10px] font-medium text-gray-400" id="sl5">Delivery</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <div class="pstep-circle pstep-idle" id="sc6">6</div>
          <span class="hidden sm:block text-[10px] font-medium text-gray-400" id="sl6">Summary</span>
        </div>
        <div class="flex flex-col items-center gap-1">
          <div class="pstep-circle pstep-idle" id="sc7">✓</div>
          <span class="hidden sm:block text-[10px] font-medium text-gray-400" id="sl7">Confirm</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════ MAIN CONTENT ═══════════════════════════════ -->
<main class="max-w-5xl mx-auto px-4 sm:px-6 py-8">
  <div id="step-wrap" class="step-enter" style="min-height:380px;"></div>

  <!-- Nav buttons -->
  <div class="flex items-center justify-between mt-8 pt-6 border-t border-gray-200" id="nav-row">
    <button class="btn-secondary" id="back-btn" onclick="goBack()" style="display:none;">← Back</button>
    <div></div>
    <button class="btn-primary" id="next-btn" onclick="goNext()">Next →</button>
  </div>
</main>

<!-- ═══════════════════════════════ STICKY FOOTER ═══════════════════════════════ -->
<div class="fixed bottom-0 left-0 right-0 z-50 bg-forest" style="box-shadow:0 -4px 24px rgba(0,0,0,.2);">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
    <div>
      <div class="text-xs font-bold tracking-widest" style="color:rgba(255,255,255,.45);">RUNNING TOTAL</div>
      <div class="text-2xl font-bold text-white" id="foot-total">$0.00</div>
    </div>
    <div class="text-right">
      <div class="text-sm font-semibold" style="color:#68b030;" id="foot-plan"></div>
      <div class="text-xs" style="color:rgba(255,255,255,.45);" id="foot-guests"></div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════ JAVASCRIPT ═══════════════════════════════ -->
<script>
// ─────────────────────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────────────────────
const PLANS = [
  { id:'starter',  name:'ReBuilt Starter',    price:13, tagline:'Best for offices & team lunches',                emoji:'🥩', lead:2,
    desc:'Fully customizable proteins & sides. Built for your team.' },
  { id:'classics', name:'ReBuilt Classics',   price:15, tagline:'The full ReBuilt experience',                    emoji:'⭐', lead:3,
    desc:'Chef-curated weekly dishes. Globally inspired, seasonally driven.' },
  { id:'grabgo',   name:'ReBuilt Grab & Go',  price:12, tagline:'Best for corporate drop-offs & tight schedules', emoji:'🥪', lead:4,
    desc:'Pre-packed wraps & sandwiches. Zero setup, ready to distribute.' },
];

const PROTEINS = [
  { name:'Pulled Beef Short Rib',           up:7 },
  { name:'Korean BBQ Beef',                 up:3 },
  { name:'Flank Steak',                     up:3 },
  { name:'Herb Rubbed Turkey',              up:0 },
  { name:'Garlic & Rosemary Pulled Turkey', up:0 },
  { name:'Blackened Turkey',                up:0 },
  { name:'Turkey Burger',                   up:0 },
  { name:'Orange Ginger Chicken Breast',    up:0 },
  { name:'Teriyaki Chicken Breast Pieces',  up:0 },
  { name:'Hawaiian Glazed Chicken Breast',  up:0 },
  { name:'BBQ Pulled Chicken',              up:0 },
  { name:'Salt Free Roasted Chicken Breast',up:0 },
  { name:'Salt & Pepper Chicken Breast',    up:0 },
  { name:'Blackened Chicken Breast',        up:0 },
  { name:'Citrus Grill Chicken Breast',     up:0 },
  { name:'Salt Free Ground Beef',           up:0 },
  { name:'Ground Beef',                     up:0 },
  { name:'Beef Burger',                     up:0 },
  { name:'Roasted Garlic Pork',             up:0 },
  { name:'Pork Carnitas',                   up:0 },
  { name:'Salt & Pepper Chicken Thigh',     up:0 },
  { name:'Chili Lime Chicken Thigh',        up:0 },
  { name:'Salt Free Roasted Pork',          up:0 },
  { name:'Blackened Chicken Thigh',         up:0 },
  { name:'Lemon Pepper Chicken Thigh',      up:0 },
  { name:'BBQ Pulled Pork',                 up:0 },
  { name:'Ground Turkey',                   up:0 },
  { name:'Beyond Burger',                   up:0 },
];

const SIDES = [
  'Roasted Sweet Potatoes','Roasted Red Potatoes','Basmati Rice','Brown Rice','Fiesta Rice',
  'Roasted Asparagus','Shaved Brussels Sprouts w/ Bacon','Buffalo Cauliflower',
  'Garlic & Onion Green Beans','Fajita Vegetables','Salt & Pepper Broccoli',
  'Roasted Brussels Sprouts','White Cheddar Jalapeño Mac & Cheese',
];

const GRABGO = [
  { name:'Turkey & Avocado Club',                 tag:null, note:null,               up:0 },
  { name:'Zesty Chipotle Chicken Salad Wrap',     tag:null, note:null,               up:0 },
  { name:'Roasted Chicken Caprese Salad Wrap',    tag:null, note:null,               up:0 },
  { name:'BLT or Club Sandwich',                  tag:null, note:'avocado +$1/person',up:1 },
  { name:'ReBuilt Cuban Sandwich',                tag:null, note:null,               up:0 },
  { name:'Chicken Caesar Wrap',                   tag:null, note:null,               up:0 },
  { name:'Buffalo Chicken Wrap',                  tag:null, note:null,               up:0 },
  { name:'Hummus & Quinoa Wrap',                  tag:'V',  note:null,               up:0 },
  { name:'Roasted Carrot & Parsnip Salad Wrap',   tag:'V',  note:null,               up:0 },
];

const SALADS = [
  { name:'Classic Caesar Salad',   half:25, full:45 },
  { name:'Garden Mixed Greens',    half:25, full:45 },
  { name:'Greek Salad',            half:25, full:45 },
  { name:'Seasonal Fruit Salad',   half:25, full:45 },
];

const DESSERTS = [
  { name:'Cookie & Bar Selection',       emoji:'🍪', ppd:14 },
  { name:'Doughnuts (flavor of the week)',emoji:'🍩', ppd:14 },
  { name:'Muffin Assortment',            emoji:'🧁', ppd:14 },
];

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
const S = {
  step: 1,
  plan: null,
  proteins: [],
  sides: [],
  grabgo: [],
  addOns: { bev: false, salads: {}, desserts: {}, plating: 'family' },
  det: { date:'', guests:10, addr:'', co:'', cname:'', cemail:'', notes:'' },
};

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
function calcTotal() {
  if (!S.plan) return 0;
  const pl = PLANS.find(p => p.id === S.plan);
  const g  = Math.max(0, parseInt(S.det.guests) || 0);
  let t = pl.price * g;
  if (S.plan === 'starter') {
    S.proteins.forEach(n => { const p = PROTEINS.find(x => x.name===n); if (p?.up) t += p.up * g; });
  }
  if (S.plan === 'grabgo' && S.grabgo.includes('BLT or Club Sandwich')) t += g;
  if (S.addOns.bev) t += 4 * g;
  Object.entries(S.addOns.salads).forEach(([n,sz]) => {
    const s = SALADS.find(x => x.name===n); if (s) t += sz==='half' ? s.half : s.full;
  });
  Object.entries(S.addOns.desserts).forEach(([n,q]) => {
    const d = DESSERTS.find(x => x.name===n); if (d) t += d.ppd * (parseInt(q)||0);
  });
  return t;
}

function bizDaysAhead(n) {
  const d = new Date(); d.setHours(0,0,0,0);
  let added = 0;
  while (added < n) { d.setDate(d.getDate()+1); const dw = d.getDay(); if (dw!==0&&dw!==6) added++; }
  return d.toISOString().split('T')[0];
}

function fmtDate(s) {
  if (!s) return 'TBD';
  return new Date(s+'T12:00:00').toLocaleDateString('en-US',{ weekday:'long',month:'long',day:'numeric',year:'numeric' });
}

function chk(id)  { return `<svg class="w-3 h-3 text-white" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>`; }
function chkLg()  { return `<svg class="w-3.5 h-3.5 text-white" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>`; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = '⚠️  ' + msg;
  t.style.display = 'block';
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.style.display='none', 3400);
}

// ─────────────────────────────────────────────────────────────────────────────
// PROGRESS / NAV UPDATE
// ─────────────────────────────────────────────────────────────────────────────
function updateUI() {
  const s = S.step;

  for (let i=1;i<=7;i++) {
    const ci = document.getElementById('sc'+i);
    const li = document.getElementById('sl'+i);
    ci.className = 'pstep-circle ';
    if (i < s)      { ci.className += 'pstep-done';   ci.textContent = '✓'; }
    else if (i===s) { ci.className += 'pstep-active';  ci.textContent = i===7?'✓':i; }
    else            { ci.className += 'pstep-idle';    ci.textContent = i===7?'✓':i; }
    if (li) {
      li.className = 'hidden sm:block text-[10px] font-semibold ';
      li.className += i===s ? 'text-forest' : i<s ? 'text-forest-mid' : 'text-gray-400';
    }
  }

  // Progress fill: track spans center-of-circle-1 to center-of-circle-7 (6 gaps)
  const pct = (s-1)/6;
  document.getElementById('prog-fill').style.width = `calc(${pct*100}% - ${pct*34}px)`;

  // Footer
  const total = calcTotal();
  document.getElementById('foot-total').textContent = '$'+total.toFixed(2);
  const pl = PLANS.find(p=>p.id===S.plan);
  document.getElementById('foot-plan').textContent   = pl ? pl.name : '';
  document.getElementById('foot-guests').textContent = pl ? `${S.det.guests||0} guests` : '';

  // Nav
  const navRow  = document.getElementById('nav-row');
  const backBtn = document.getElementById('back-btn');
  const nextBtn = document.getElementById('next-btn');

  if (s===1 || s===7) {
    navRow.style.display = 'none';
  } else {
    navRow.style.display = 'flex';
    backBtn.style.display = s===1 ? 'none' : 'block';
    if (s===6) {
      const ok = total >= 500;
      nextBtn.textContent = 'Proceed to Checkout →';
      nextBtn.disabled = !ok;
    } else {
      nextBtn.textContent = 'Next →';
      nextBtn.disabled = false;
    }
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER DISPATCHER
// ─────────────────────────────────────────────────────────────────────────────
function render() {
  const w = document.getElementById('step-wrap');
  w.classList.remove('step-enter');
  void w.offsetWidth;
  w.classList.add('step-enter');
  const map = [null, step1, step2, step3, step4, step5, step6, step7];
  w.innerHTML = map[S.step]();
  updateUI();
}

// ─────────────────────────────────────────────────────────────────────────────
// STEP 1 — Plan Selection
// ─────────────────────────────────────────────────────────────────────────────
function step1() {
  return `
    <div>
      <h1 class="text-3xl font-bold text-forest mb-1" style="letter-spacing:-.5px;">Choose Your Plan</h1>
      <p class="text-gray-500 mb-8">Select the catering experience that fits your event.</p>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
        ${PLANS.map((p,i) => {
          const sel = S.plan===p.id;
          return `
            <div onclick="pickPlan(${i})" class="cursor-pointer rounded-2xl border-2 bg-white card-hover overflow-hidden relative
              ${sel ? 'border-forest' : 'border-gray-200 hover:border-forest hover:shadow-lg'}"
              style="${sel ? 'box-shadow:0 0 0 4px rgba(30,69,32,.13);' : ''}">
              <div class="h-1.5 ${sel ? 'bg-forest' : 'bg-gray-100'}"></div>
              <div class="p-6">
                <div class="flex items-start justify-between mb-4">
                  <span class="text-4xl">${p.emoji}</span>
                  ${sel ? `<span class="flex items-center gap-1 text-xs font-bold text-forest bg-green-50 px-2.5 py-1 rounded-full">
                    ${chk()} Selected</span>` : ''}
                </div>
                <div class="text-[10px] font-bold tracking-widest text-gray-400 uppercase mb-1">${p.lead} business day lead time</div>
                <h3 class="text-xl font-bold text-forest mb-1" style="letter-spacing:-.3px;">${p.name}</h3>
                <div class="font-bold text-2xl mb-4" style="color:#c8922a;">
                  $${p.price}<span class="text-sm font-normal text-gray-400">/person</span>
                </div>
                <div class="border-t border-gray-100 pt-4">
                  <p class="text-sm text-gray-600 italic leading-relaxed">"${p.tagline}"</p>
                  <p class="text-xs text-gray-400 mt-2">${p.desc}</p>
                </div>
              </div>
            </div>`;
        }).join('')}
      </div>
      <p class="text-center text-sm text-gray-400 mt-6">Click a plan to select it and continue →</p>
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// STEP 2 — Guest Count + Event Date
// ─────────────────────────────────────────────────────────────────────────────
function step2() {
  const pl = PLANS.find(p=>p.id===S.plan);
  const min = bizDaysAhead(pl.lead);
  const d = S.det;
  return `
    <div class="max-w-xl mx-auto">
      <h1 class="text-3xl font-bold text-forest mb-1" style="letter-spacing:-.5px;">When & How Many?</h1>
      <p class="text-gray-500 mb-8">Set your event date and guest count so we can lock in your order.</p>

      <div class="bg-white rounded-2xl border border-gray-200 p-6 sm:p-8 space-y-8">

        <!-- Guest count -->
        <div>
          <label class="block text-sm font-bold text-forest mb-2">Number of Guests <span class="text-red-400">*</span></label>
          <div class="flex items-center gap-4">
            <button class="qty-btn" style="width:44px;height:44px;font-size:24px;" onclick="adjGuests(-5)">−</button>
            <input type="number" id="guests" value="${d.guests}" min="1"
              oninput="setDet('guests',this.value)"
              class="flex-1 border-2 border-gray-200 rounded-2xl px-4 py-3 text-center font-bold text-3xl bg-white"
              style="-moz-appearance:textfield;">
            <button class="qty-btn" style="width:44px;height:44px;font-size:24px;" onclick="adjGuests(5)">+</button>
          </div>
          <p class="text-xs text-gray-400 mt-2 text-center">Use the buttons to adjust in steps of 5, or type a number</p>
        </div>

        <!-- Divider -->
        <div class="border-t border-gray-100"></div>

        <!-- Event date -->
        <div>
          <label class="block text-sm font-bold text-forest mb-2">Event Date <span class="text-red-400">*</span></label>
          <input type="date" id="date" value="${d.date}" min="${min}"
            onchange="setDet('date',this.value)"
            class="w-full border-2 border-gray-200 rounded-2xl px-4 py-3 text-base bg-white">
          <div class="mt-2 flex items-center gap-2 text-xs text-gray-400">

function step3() {
  if (S.plan==='starter')  return step3Starter();
  if (S.plan==='classics') return step3Classics();
  if (S.plan==='grabgo')   return step3GrabGo();
  return '';
}

function selChip(isOn) {
  return `<div class="w-4 h-4 rounded border-2 flex items-center justify-center flex-shrink-0 transition-all
    ${isOn ? 'bg-forest border-forest' : 'border-gray-300'}">${isOn ? chk() : ''}</div>`;
}

function step3Starter() {
  const pc = S.proteins.length, sc = S.sides.length;
  const chip = (label,isOn,isDis,fn) =>
    `<div onclick="${isDis?'':fn}" class="chip flex items-start gap-2 p-3 rounded-xl border-2 text-sm
      ${isOn  ? 'border-forest bg-green-50 text-forest font-semibold' :
        isDis ? 'border-gray-100 bg-gray-50 text-gray-400 opacity-50 cursor-not-allowed' :
               'border-gray-200 bg-white text-gray-700 cursor-pointer hover:border-forest hover:shadow-sm'}">
      ${selChip(isOn)}<span class="leading-snug">${label}</span></div>`;

  return `
    <div>
      <h1 class="text-3xl font-bold text-forest mb-1" style="letter-spacing:-.5px;">Customize Your Order</h1>
      <p class="text-gray-500 mb-8">Pick <strong>2 proteins</strong> and <strong>4 sides</strong> for your team.</p>

      <div class="mb-8">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-lg font-bold text-forest">Proteins</h2>
          <span class="text-sm px-3 py-1 rounded-full font-bold
            ${pc===2 ? 'bg-green-100 text-green-700' : 'bg-amber-50 text-amber-600 border border-amber-200'}">${pc} / 2</span>
        </div>
        <div class="grid gap-2" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr));">
          ${PROTEINS.map((p,i) => {
            const on = S.proteins.includes(p.name), dis = !on && pc>=2;
            return `<div onclick="${dis?'':(`toggleProtein(${i})`)}" class="chip relative flex flex-col p-3 rounded-xl border-2 text-sm
              ${on  ? 'border-forest bg-green-50 text-forest font-semibold cursor-pointer' :
                dis ? 'border-gray-100 bg-gray-50 text-gray-400 opacity-50 cursor-not-allowed' :
                     'border-gray-200 bg-white text-gray-700 cursor-pointer hover:border-forest hover:shadow-sm'}">
              <div class="flex items-start gap-2">${selChip(on)}<span class="leading-snug flex-1">${p.name}</span></div>
              ${p.up ? `<span class="upcharge-badge self-start ml-6">+$${p.up}/person</span>` : ''}
            </div>`;
          }).join('')}
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-lg font-bold text-forest">Sides</h2>
          <span class="text-sm px-3 py-1 rounded-full font-bold
            ${sc===4 ? 'bg-green-100 text-green-700' : 'bg-amber-50 text-amber-600 border border-amber-200'}">${sc} / 4</span>
        </div>
        <div class="grid gap-2" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr));">
          ${SIDES.map((s,i) => {
            const on = S.sides.includes(s), dis = !on && sc>=4;
            return chip(s, on, dis, `toggleSide(${i})`);
          }).join('')}
        </div>
      </div>
    </div>`;
}

  return `
    <div>
      <h1 class="text-3xl font-bold text-forest mb-1" style="letter-spacing:-.5px;">ReBuilt Classics</h1>

            <div class="p-4 bg-cream rounded-2xl"><div class="text-2xl mb-2">🔄</div><div class="text-xs font-semibold text-gray-500">Weekly<br>Rotating</div></div>

            <label class="block text-sm font-bold text-forest mb-1.5">Delivery Address <span class="text-red-400">*</span></label>

}

// STEP 6 — Order Summary
// ─────────────────────────────────────────────────────────────────────────────
function step6() {
  const pl = PLANS.find(p=>p.id===S.plan);
  const d = S.det, g = parseInt(d.guests)||0, total = calcTotal(), ok = total>=500;
  const lines = [];

  lines.push({ label:`${pl.name} base (${g} × $${pl.price})`, amt: pl.price*g, bold:true });
  if (S.plan==='starter') {
    S.proteins.forEach(n => {
      const p = PROTEINS.find(x=>x.name===n);
      if (p?.up) lines.push({ label:`${n} upcharge (${g} × $${p.up})`, amt:p.up*g });
    });
  }
  if (S.plan==='grabgo' && S.grabgo.includes('BLT or Club Sandwich'))
    lines.push({ label:`Avocado upcharge — BLT (${g} × $1)`, amt:g });
  if (S.addOns.bev)
    lines.push({ label:`Beverage Bundle (${g} × $4)`, amt:4*g });
  Object.entries(S.addOns.salads).forEach(([n,sz]) => {
    const s = SALADS.find(x=>x.name===n); if (!s) return;
    lines.push({ label:`${n} · ${sz==='half'?'Half (10–12)':'Full (20–24)'}`, amt:sz==='half'?s.half:s.full });
  });
  Object.entries(S.addOns.desserts).forEach(([n,q]) => {
    if (q>0) lines.push({ label:`${n} · ${q} doz.`, amt:14*q });
  });

  const tag = txt => `<span class="text-xs bg-green-50 text-green-800 border border-green-200 px-2.5 py-1 rounded-full font-medium">${txt}</span>`;

  return `
    <div>
      <h1 class="text-3xl font-bold text-forest mb-1" style="letter-spacing:-.5px;">Order Summary</h1>
      <p class="text-gray-500 mb-6">Review everything before placing your order.</p>

      <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden mb-4">
        <!-- Header -->
        <div class="p-5 bg-forest text-white">
          <div class="flex items-start justify-between">
            <div>
              <div class="text-xs font-bold tracking-widest uppercase mb-1" style="color:rgba(255,255,255,.45);">Selected Plan</div>
              <div class="text-xl font-bold">${pl.name}</div>
              <div class="text-sm mt-1" style="color:rgba(255,255,255,.65);">${fmtDate(d.date)} · ${g} guest${g!==1?'s':''}</div>
            </div>
            <div class="text-sm text-right" style="color:rgba(255,255,255,.65);">
              ${S.addOns.plating==='family'?'🍽️ Family Style':'📦 Individually Packaged'}
            </div>
          </div>
        </div>

        <!-- Event info -->
        <div class="p-5 border-b border-gray-100 grid grid-cols-1 sm:grid-cols-2 gap-1.5 text-sm">
          ${d.addr   ? `<div><span class="text-gray-400 font-medium">Address:</span> <span class="text-gray-700">${d.addr}</span></div>` : ''}
          ${d.co     ? `<div><span class="text-gray-400 font-medium">Company:</span> <span class="text-gray-700">${d.co}</span></div>` : ''}
          <div><span class="text-gray-400 font-medium">Contact:</span> <span class="text-gray-700">${d.cname}</span></div>
          <div><span class="text-gray-400 font-medium">Email:</span> <span class="text-gray-700">${d.cemail}</span></div>
          ${d.notes  ? `<div class="sm:col-span-2"><span class="text-gray-400 font-medium">Notes:</span> <span class="text-gray-700">${d.notes}</span></div>` : ''}
        </div>

        <!-- Selections -->
        ${S.plan==='starter' ? `
          <div class="p-5 border-b border-gray-100">
            <div class="text-xs font-bold tracking-wider text-gray-400 uppercase mb-3">Selections</div>
            <div class="mb-2"><span class="text-xs font-bold text-forest uppercase tracking-wide">Proteins:</span>
              <div class="flex flex-wrap gap-1.5 mt-1.5">${S.proteins.map(tag).join('')}</div></div>
            <div class="mt-3"><span class="text-xs font-bold text-forest uppercase tracking-wide">Sides:</span>
              <div class="flex flex-wrap gap-1.5 mt-1.5">${S.sides.map(tag).join('')}</div></div>
          </div>` : ''}
        ${S.plan==='grabgo' ? `
          <div class="p-5 border-b border-gray-100">
            <div class="text-xs font-bold tracking-wider text-gray-400 uppercase mb-3">Selected Items</div>
            <div class="flex flex-wrap gap-1.5">${S.grabgo.map(tag).join('')}</div>
          </div>` : ''}
        ${S.plan==='classics' ? `
          <div class="p-5 border-b border-gray-100">
            <div class="text-xs font-bold tracking-wider text-gray-400 uppercase mb-2">Menu</div>
            <p class="text-sm text-gray-600">Chef's weekly selection — 2 rotating globally inspired dishes</p>
          </div>` : ''}

        <!-- Pricing -->
        <div class="p-5">
          <div class="text-xs font-bold tracking-wider text-gray-400 uppercase mb-4">Pricing Breakdown</div>
          <div class="space-y-2.5">
            ${lines.map(l => `
              <div class="flex justify-between items-start text-sm ${l.bold?'font-semibold text-forest':'text-gray-600'}">
                <span class="pr-4 flex-1">${l.label}</span>
                <span class="font-semibold flex-shrink-0">$${l.amt.toFixed(2)}</span>
              </div>`).join('')}
          </div>
          <div class="mt-4 pt-4 border-t-2 border-gray-100 flex justify-between items-center">
            <span class="text-lg font-bold text-forest">Total</span>
            <span class="text-2xl font-bold text-forest">$${total.toFixed(2)}</span>
          </div>
        </div>
      </div>

      <!-- Min warning -->
      ${!ok ? `
        <div class="p-4 rounded-2xl border border-red-200 bg-red-50 flex items-start gap-3">
          <span class="text-red-500 text-xl flex-shrink-0">⚠️</span>
          <div>
            <div class="font-bold text-red-700 text-sm">Order Minimum Not Met</div>
            <div class="text-sm text-red-600 mt-1">Minimum order is <strong>$500</strong>. Your total is $${total.toFixed(2)}.
            Go back to increase guest count or add items.</div>
          </div>
        </div>` :
      `<div class="p-4 rounded-2xl border border-green-200 bg-green-50 flex items-center gap-3">
          <svg class="w-5 h-5 text-green-600 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
          </svg>
          <div class="text-sm font-semibold text-green-800">You're all set — click "Proceed to Checkout" below.</div>
        </div>`}
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// STEP 7 — Confirmation
// ─────────────────────────────────────────────────────────────────────────────
function step7() {
  const pl = PLANS.find(p=>p.id===S.plan);
  const d = S.det, total = calcTotal();
  return `
    <div class="text-center py-4 max-w-lg mx-auto">
      <div class="w-24 h-24 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-6">
        <svg class="w-12 h-12 text-forest" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold text-forest mb-3" style="letter-spacing:-.5px;">Order Received!</h1>
      <p class="text-gray-600 leading-relaxed mb-8">
        Your order has been received! A member of the <strong>ReBuilt Meals</strong> catering team will
        confirm your order within <strong>1 business day</strong>.
      </p>

      <div class="bg-white rounded-2xl border border-gray-200 p-5 text-left mb-5">
        <div class="text-xs font-bold tracking-wider text-gray-400 uppercase mb-4">Order Confirmation</div>
        <div class="space-y-3 text-sm">
          <div class="flex justify-between"><span class="text-gray-400">Plan</span><span class="font-semibold text-forest">${pl.name}</span></div>
          <div class="flex justify-between"><span class="text-gray-400">Date</span><span class="font-semibold text-forest">${fmtDate(d.date)}</span></div>
          <div class="flex justify-between"><span class="text-gray-400">Guests</span><span class="font-semibold text-forest">${d.guests}</span></div>
          <div class="flex justify-between items-start gap-4"><span class="text-gray-400 flex-shrink-0">Delivery</span><span class="font-semibold text-forest text-right">${d.addr}</span></div>
          ${d.co ? `<div class="flex justify-between"><span class="text-gray-400">Company</span><span class="font-semibold text-forest">${d.co}</span></div>` : ''}
          <div class="flex justify-between"><span class="text-gray-400">Contact</span><span class="font-semibold text-forest">${d.cname}</span></div>
          <div class="border-t border-gray-100 pt-3 flex justify-between items-center">
            <span class="font-bold text-forest text-base">Order Total</span>
            <span class="font-bold text-forest text-xl">$${total.toFixed(2)}</span>
          </div>
        </div>
      </div>

      <div class="p-4 rounded-xl bg-amber-50 border border-amber-200 text-sm text-amber-800 mb-8">
        Confirmation will be sent to <strong>${d.cemail}</strong>
      </div>

      <button onclick="resetOrder()" class="btn-primary">↩ Start a New Order</button>
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// EVENT HANDLERS
// ─────────────────────────────────────────────────────────────────────────────
function pickPlan(i) {
  const id = PLANS[i].id;
  if (S.plan !== id) { S.proteins=[]; S.sides=[]; S.grabgo=[]; }
  S.plan = id; S.step = 2;
  render(); scrollTo({top:0,behavior:'smooth'});
}

function toggleProtein(i) {
  const n = PROTEINS[i].name, idx = S.proteins.indexOf(n);
  if (idx>=0) S.proteins.splice(idx,1);
  else if (S.proteins.length<2) S.proteins.push(n);
  render();
}
function toggleSide(i) {
  const n = SIDES[i], idx = S.sides.indexOf(n);
  if (idx>=0) S.sides.splice(idx,1);
  else if (S.sides.length<4) S.sides.push(n);
  render();
}
function toggleGrabGo(i) {
  const n = GRABGO[i].name, idx = S.grabgo.indexOf(n);
  if (idx>=0) S.grabgo.splice(idx,1);
  else if (S.grabgo.length<3) S.grabgo.push(n);
  render();
}
function toggleBev()        { S.addOns.bev = !S.addOns.bev; render(); }
function toggleSalad(i)     {
  const n = SALADS[i].name;
  if (S.addOns.salads[n]!=null) delete S.addOns.salads[n];
  else S.addOns.salads[n] = 'half';
  render();
}
function setSaladSz(i,sz)   { S.addOns.salads[SALADS[i].name]=sz; render(); }
function dessertQty(i,d)    {
  const n=DESSERTS[i].name, cur=S.addOns.desserts[n]||0, nxt=Math.max(0,cur+d);
  if (nxt===0) delete S.addOns.desserts[n]; else S.addOns.desserts[n]=nxt;
  render();
}
function setPlating(t)      { S.addOns.plating=t; render(); }

function setDet(k,v) {
  if (k==='guests') { const n=Math.max(1,parseInt(v)||1); S.det.guests=n; }
  else S.det[k] = v;
  updateUI();
}
function adjGuests(d) {
  S.det.guests = Math.max(1,(parseInt(S.det.guests)||1)+d);
  const el = document.getElementById('guests'); if (el) el.value = S.det.guests;
  updateUI();
}

// ─────────────────────────────────────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────────────────────────────────────
function validate() {
  const s = S.step;
  if (s===1 && !S.plan)
    return showToast('Please select a plan.'), false;
  if (s===2) {
    const d=S.det;
    if (!d.date)                                   return showToast('Please select an event date.'), false;
    if (!d.guests||d.guests<1)                     return showToast('Enter a valid guest count.'), false;
  }
  if (s===3 && S.plan==='starter') {
    if (S.proteins.length!==2)                     return showToast('Select exactly 2 proteins.'), false;
    if (S.sides.length!==4)                        return showToast('Select exactly 4 sides.'), false;
  }
  if (s===3 && S.plan==='grabgo' && S.grabgo.length!==3)
                                                   return showToast('Select exactly 3 items.'), false;
  if (s===5) {
    const d=S.det;
    if (!d.addr.trim())                            return showToast('Please enter a delivery address.'), false;
    if (!d.cname.trim())                           return showToast('Please enter a contact name.'), false;
    if (!d.cemail.trim()||!d.cemail.includes('@')) return showToast('Please enter a valid email.'), false;
  }
  if (s===6 && calcTotal()<500)
    return showToast('Order minimum is $500.'), false;
  return true;
}

function goNext() {
  if (!validate()) return;
  if (S.step<7) { S.step++; render(); scrollTo({top:0,behavior:'smooth'}); }
}
function goBack() {
  if (S.step>1) { S.step--; render(); scrollTo({top:0,behavior:'smooth'}); }
}
function resetOrder() {
  S.step=1; S.plan=null; S.proteins=[]; S.sides=[]; S.grabgo=[];
  S.addOns={bev:false,salads:{},desserts:{},plating:'family'};
  S.det={date:'',guests:10,addr:'',co:'',cname:'',cemail:'',notes:''};
  render(); scrollTo({top:0,behavior:'smooth'});
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
